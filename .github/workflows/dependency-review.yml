# HMS-BR — Dependency Review
#
# Bloqueia PRs que introduzam dependências com vulnerabilidades GHSA
# de severidade alta (ou crítica) ou com licenças incompatíveis.
# Roda apenas em pull_request — comparing base ↔ head.

name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review (GHSA gate)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Falha em vulnerabilidades high+ (high e critical).
          fail-on-severity: high
          # Comenta no PR um resumo das diffs de dependência.
          comment-summary-in-pr: on-failure
